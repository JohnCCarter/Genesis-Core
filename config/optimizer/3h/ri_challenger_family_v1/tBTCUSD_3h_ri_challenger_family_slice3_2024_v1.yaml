description: "Regime Intelligence challenger family slice 3: generalization-focused search around the validated RI family on 2023-12-21..2024-06-30, rank on 2024-07-01..2024-12-31 (3h)"
strategy_family: ri
#
# Purpose:
# - keep the validated RI challenger-family identity from slice 2
# - avoid simply rerunning 200 trials on the same slice-2 threshold-heavy search space
# - open exit/override/fib-tolerance surfaces that are more likely to affect validation robustness
# - keep the incumbent champion as the external control baseline

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2023-12-21_2024-06-30_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2023-12-21"
    sample_end: "2024-06-30"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2024-07-01"
      sample_end: "2024-12-31"
      top_n: 5
      constraints:
        include_scoring_failures: false
        min_trades: 20
        min_profit_factor: 1.05
        max_max_dd: 0.35

    resume: false
    max_trials: 200
    max_concurrent: 1

    promotion:
      enabled: false

    optuna:
      study_name: "ri_challenger_family_slice3_3h_2024_v1"
      storage: "sqlite:///results/hparam_search/storage/ri_challenger_family_slice3_3h_2024_v1.db"
      n_jobs: 1
      timeout_seconds: 21600

      bootstrap_random_trials: 24
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 24
          n_ei_candidates: 64
          multivariate: true
          group: true
          constant_liar: true
          seed: 42

constraints:
  include_scoring_failures: false
  max_max_dd: 0.60
  min_profit_factor: 0.80

  scoring_thresholds:
    min_trades: 10
    min_profit_factor: 0.0
    max_max_dd: 1.0

parameters:
  thresholds.min_edge:
    type: fixed
    value: 0.01
  thresholds.regime_proba.bull:
    type: fixed
    value: 0.5
  thresholds.regime_proba.bear:
    type: fixed
    value: 0.5
  thresholds.regime_proba.ranging:
    type: fixed
    value: 0.5
  thresholds.signal_adaptation.atr_period:
    type: fixed
    value: 14
  htf_exit_config.partial_1_pct:
    type: fixed
    value: 0.5
  htf_exit_config.partial_2_pct:
    type: fixed
    value: 0.45
  htf_exit_config.fib_threshold_atr:
    type: fixed
    value: 0.9
  htf_exit_config.trail_atr_multiplier:
    type: fixed
    value: 2.5
  gates.hysteresis_steps:
    type: fixed
    value: 3
  gates.cooldown_bars:
    type: fixed
    value: 2
  multi_timeframe.regime_intelligence.enabled:
    type: fixed
    value: true
  multi_timeframe.regime_intelligence.version:
    type: fixed
    value: "v2"
  multi_timeframe.regime_intelligence.authority_mode:
    type: fixed
    value: "regime_module"
  multi_timeframe.regime_intelligence.clarity_score.enabled:
    type: fixed
    value: false
  multi_timeframe.regime_intelligence.risk_state.enabled:
    type: fixed
    value: true
  multi_timeframe.regime_intelligence.risk_state.drawdown_guard.soft_threshold:
    type: fixed
    value: 0.04
