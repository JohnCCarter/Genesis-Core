description: "Legacy L-S3 slice 1: bounded threshold/candidate probe on 2024 with 2025 validation"
strategy_family: legacy
meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2024-01-02_2024-12-31_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"
    use_sample_range: true
    sample_start: "2024-01-02"
    sample_end: "2024-12-31"
    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2025-01-01"
      sample_end: "2025-12-31"
      top_n: 3
      constraints:
        include_scoring_failures: false
        min_trades: 10
        min_profit_factor: 1.05
        max_max_dd: 0.45
    resume: false
    max_trials: 8
    max_concurrent: 1
    promotion:
      enabled: false
    optuna:
      study_name: "legacy_decision_slice1_3h_2024_2025_smoke"
      storage: "sqlite:///results/hparam_search/storage/legacy_decision_slice1_3h_2024_2025_smoke.db"
      n_jobs: 1
      timeout_seconds: 1200
      bootstrap_random_trials: 4
      bootstrap_seed: 42
      pruner:
        type: "none"
      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 4
          seed: 42

parameters:
  thresholds:
    entry_conf_overall:
      type: fixed
      value: 0.26
    min_edge:
      type: fixed
      value: 0.01
    regime_proba:
      balanced:
        type: float
        low: 0.44
        high: 0.56
        step: 0.02
      bull:
        type: fixed
        value: 0.52
      bear:
        type: fixed
        value: 0.48
      ranging:
        type: fixed
        value: 0.50
    signal_adaptation:
      atr_period:
        type: fixed
        value: 28
      zones:
        low:
          entry_conf_overall:
            type: float
            low: 0.22
            high: 0.28
            step: 0.02
          regime_proba:
            type: float
            low: 0.32
            high: 0.40
            step: 0.02
        mid:
          entry_conf_overall:
            type: float
            low: 0.28
            high: 0.36
            step: 0.02
          regime_proba:
            type: float
            low: 0.40
            high: 0.48
            step: 0.02
        high:
          entry_conf_overall:
            type: float
            low: 0.34
            high: 0.42
            step: 0.02
          regime_proba:
            type: float
            low: 0.50
            high: 0.60
            step: 0.02

  gates:
    hysteresis_steps:
      type: fixed
      value: 2
    cooldown_bars:
      type: fixed
      value: 0

  exit:
    exit_conf_threshold:
      type: fixed
      value: 0.42
    max_hold_bars:
      type: fixed
      value: 12
    trailing_stop_pct:
      type: fixed
      value: 0.015

  htf_exit_config:
    partial_1_pct:
      type: fixed
      value: 0.55
    partial_2_pct:
      type: fixed
      value: 0.45
    fib_threshold_atr:
      type: fixed
      value: 0.8
    trail_atr_multiplier:
      type: fixed
      value: 2.4
    enable_partials:
      type: fixed
      value: true
    enable_trailing:
      type: fixed
      value: true

  risk:
    risk_map:
      type: fixed
      value:
        - [0.6, 0.02]
        - [0.7, 0.03]
        - [0.8, 0.04]
        - [0.9, 0.05]
    regime_size_multipliers:
      type: fixed
      value:
        bull: 1.0
        bear: 0.7
        ranging: 0.5
        balanced: 0.8
    htf_regime_size_multipliers:
      type: fixed
      value:
        bull: 1.0
        bear: 0.5
        ranging: 0.7
        unknown: 0.8
    volatility_sizing:
      enabled:
        type: fixed
        value: true
      high_vol_threshold:
        type: fixed
        value: 80
      high_vol_multiplier:
        type: fixed
        value: 0.7
      atr_period:
        type: fixed
        value: 14
    min_combined_multiplier:
      type: fixed
      value: 0.15

  multi_timeframe:
    use_htf_block:
      type: fixed
      value: true
    allow_ltf_override:
      type: fixed
      value: true
    ltf_override_threshold:
      type: fixed
      value: 0.45
    htf_selector:
      mode:
        type: fixed
        value: "fixed"
      fallback_timeframe:
        type: fixed
        value: "1D"
      per_timeframe:
        "3h":
          timeframe:
            type: fixed
            value: "1D"
          multiplier:
            type: fixed
            value: null

  htf_fib:
    entry:
      enabled:
        type: fixed
        value: true
      missing_policy:
        type: fixed
        value: "pass"
      tolerance_atr:
        type: fixed
        value: 3.0
      long_max_level:
        type: fixed
        value: 0.236
      short_min_level:
        type: fixed
        value: 0.35

  ltf_fib:
    entry:
      enabled:
        type: fixed
        value: true
      missing_policy:
        type: fixed
        value: "pass"
      tolerance_atr:
        type: fixed
        value: 1.25
      long_max_level:
        type: fixed
        value: 0.146
      short_min_level:
        type: fixed
        value: 0.236
