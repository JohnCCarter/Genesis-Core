description: "Regime Intelligence Decision risk-state transition-guard slice1 smoke: bounded 9-combination research grid over transition_guard guard_bars and mult on 2024-01-02..2024-03-02 (3h)"
strategy_family: ri
#
# Purpose:
# - bounded smoke for the canonical Decision transition_guard slice1 grid
# - preserve the exact 9 transition_guard tuples while shortening the sample window
# - verify artifact completeness and non-zero trading before any later launch authorization step
#
# Exact tuple set:
# - (1, 0.55)
# - (1, 0.65)
# - (1, 0.75)
# - (2, 0.55)
# - (2, 0.65)
# - (2, 0.75)
# - (3, 0.55)
# - (3, 0.65)
# - (3, 0.75)

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2023-12-21_2024-06-30_v1
  warmup_bars: 120
  runs:
    strategy: grid
    score_version: "v2"
    run_intent: research_slice

    use_sample_range: true
    sample_start: "2024-01-02"
    sample_end: "2024-03-02"

    validation:
      enabled: false

    resume: false
    max_trials: 9
    max_concurrent: 1

    promotion:
      enabled: false

constraints:
  include_scoring_failures: false
  max_max_dd: 0.60
  min_profit_factor: 0.80

  scoring_thresholds:
    min_trades: 5
    min_profit_factor: 0.0
    max_max_dd: 1.0

