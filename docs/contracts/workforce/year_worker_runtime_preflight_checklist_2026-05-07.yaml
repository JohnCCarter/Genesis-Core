  - phase_id: B
    phase_name: manifest_loading
    classification: structurally_satisfiable
    required_evidence:
      - envelope reference is visible
      - dependency manifest reference is visible
      - repo snapshot reference is visible
      - runtime manifest reference is visible
      - overlay specimen reference is visible
      - worker-year reporting specimen is visible
      - integration-side references are visible
    blocked_if:
