# Status: proposed manual draft for the research-evidence lane only.
# Non-authoritative. Not consumed by runtime, dispatch, validation, promotion,
# or shared-truth workflows.
schema_version: year_worker_integration_queue.canonical_draft.v1
draft_status: proposed_non_authoritative
manual_proposal: true
runtime_authority: none
dispatch_authority: none
promotion_authority: none
purpose: >-
  Proposed reusable manual form for integration-plane intake of one returned
  year-worker output. This draft is docs-only, non-authoritative, and defines
  intake bookkeeping and classification only; it does not automate acceptance,
  synthesis, or promotion.
required_fields:
  - name: queue_entry_id
    type: string
    description: Stable identity of one integration intake record.
  - name: slice_id
    type: string
    description: Stable identity of the returned year-worker slice.
  - name: year
    type: integer
    description: Year covered by the worker output.
  - name: symbol
    type: string
    description: Symbol pinned for the returned slice.
  - name: timeframe
    type: string
    description: Timeframe pinned for the returned slice.
  - name: base_sha
    type: string
    description: Repo state that the worker claims to have used.
  - name: manifest_hashes
    type: object
    description: Hashes for the envelope and manifests that governed the worker.
  - name: artifact_namespace
    type: string
    description: Declared namespace root for returned artifacts.
  - name: worker_output_contract_ref
    type: string
    description: Reference to the returned worker output contract.
  - name: intake_verification
    type: object
    description: Integration-plane verification of hashes, namespace, provenance, and scope.
  - name: worker_reported_status
    type: enum
    description: Status reported by the worker output contract.
  - name: worker_recommended_integration_class
    type: enum
    description: Advisory class proposed by the worker.
  - name: integration_classification
    type: enum
    description: Final intake classification owned by integration plane.
  - name: cross_year_synthesis_admission
    type: enum
    description: Whether the result may enter later cross-year synthesis.
  - name: blocking_reason
    type: enum
    description: Explicit reason intake remains blocked.
optional_fields:
  - name: notes
    type: array
    description: Human-readable caveats about intake or comparability.
  - name: action_required
    type: string
    description: Next bounded action requested by integration plane.
  - name: comparable_tuple
    type: object
    description: Fields used to decide cross-year comparability.
allowed_enum_values:
  draft_status:
    - proposed_non_authoritative
  worker_reported_status:
    - pass
    - null
    - blocked
    - fail_closed
  worker_recommended_integration_class:
    - ignore
    - park
    - blocked
    - rerun_required
    - deep_dive_required
    - integrate_candidate
  integration_classification:
    - ignore
    - park
    - blocked
    - rerun_required
    - deep_dive_required
    - integrate_candidate
  cross_year_synthesis_admission:
    - not_admitted
    - awaiting_comparable_years
    - admitted
    - blocked
  intake_verdict:
    - pending
    - verified
    - blocked
    - fail_closed
  blocking_reason:
    - none
    - base_sha_mismatch
    - manifest_hash_mismatch
    - artifact_namespace_mismatch
    - forbidden_write_detected
    - missing_provenance
    - undeclared_input_suspected
    - worker_global_claim_detected
    - promotion_language_detected
    - validation_failed
    - output_contract_incomplete
    - comparability_not_established
ownership_policy:
  rules:
    - Integration classification is intake disposition owned by integration plane alone.
    - A worker output may recommend a class, but it may not assign larger meaning, cross-year truth, or runtime action.
    - Intake verification must occur before any classification other than blocked or fail_closed is recorded.
intake_verification_policy:
  required_checks:
    - base_sha_match
    - manifest_hash_match
    - artifact_namespace_match
    - no_forbidden_write
    - no_missing_provenance
    - no_undeclared_inputs
    - no_worker_global_claim
    - no_promotion_language
  rules:
    - Any failed required check blocks intake.
    - Missing manifest hashes or missing output contract fields block intake.
    - Cross-year admission is separate from intake verification and may remain not_admitted after a verified intake.
cross_year_admission_policy:
  required_alignment_fields:
    - family
    - symbol
    - timeframe
    - baseline_config_hash
    - runtime_execution_profile
    - lane
    - command_template_identity
  rules:
    - Cross-year synthesis may only compare outputs that are comparable on the declared tuple or explicitly review-waived.
    - A worker may not self-admit its output to cross-year synthesis.
example_blocked_intake:
  queue_entry_id: intake_year_worker_ri_policy_router_2024_tbtcusd_3h_001
  slice_id: year_worker_ri_policy_router_2024_tbtcusd_3h
  year: 2024
  symbol: tBTCUSD
  timeframe: 3h
  base_sha: <PINNED_BASE_SHA>
  manifest_hashes:
    envelope_hash: <ENVELOPE_HASH>
    dependency_manifest_hash: <DEPENDENCY_MANIFEST_HASH>
    repo_snapshot_manifest_hash: <REPO_SNAPSHOT_MANIFEST_HASH>
    runtime_execution_manifest_hash: <RUNTIME_EXECUTION_MANIFEST_HASH>
    generated_overlay_hash: <GENERATED_OVERLAY_HASH>
  artifact_namespace: results/workforce/year_workers/{year}/{symbol}/{timeframe}/{lane}/{slice_id}/{run_id}/
  worker_output_contract_ref: results/workforce/year_workers/{year}/{symbol}/{timeframe}/{lane}/{slice_id}/{run_id}/worker_output_contract.yaml
  intake_verification:
    base_sha_match: true
    manifest_hash_match: false
    artifact_namespace_match: true
    no_forbidden_write: true
    no_missing_provenance: true
    no_undeclared_inputs: true
    no_worker_global_claim: true
    no_promotion_language: true
    intake_verdict: blocked
  worker_reported_status: blocked
  worker_recommended_integration_class: blocked
  integration_classification: blocked
  cross_year_synthesis_admission: not_admitted
  blocking_reason: manifest_hash_mismatch
  action_required: regenerate_the_runtime_binding_and_repeat_preflight_before_any_rerun
what_this_manifest_does_not_prove:
  - That integration classification is automated.
  - That a worker recommendation can replace integration-plane review.
  - That admitted cross-year synthesis follows automatically from one verified intake.
