description: "Phase D: Risk State optimisation -- drawdown_guard + transition_guard"
strategy_family: ri
#
# All Phase A + B params fixed directly (from Phase B trial_082 / Phase C OOS).
# Only risk_state params are tunable.
# Run: PYTHONIOENCODING=utf-8 TQDM_DISABLE=1 PYTHONPATH="$(pwd)/src" python -m core.optimizer.runner config/optimizer/3h/phased_v3/tBTCUSD_3h_phased_v3_phaseD.yaml

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2024-01-02_2024-12-31_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2024-01-01"
    sample_end: "2024-12-31"

    validation:
      enabled: true
      start_date: "2025-01-01"
      end_date: "2025-12-31"

    resume: false
    max_trials: 75
    max_concurrent: 1

    promotion:
      enabled: false

    constraints:
      include_scoring_failures: false
      min_trades: 30
      min_profit_factor: 1.10
      max_max_dd: 0.30

    optuna:
      study_name: "phased_v3_phaseD_riskstate_3h_2024"
      storage: "sqlite:///results/hparam_search/storage/phased_v3_phaseD_3h.db"
      n_jobs: 1
      timeout_seconds: 7200

      bootstrap_random_trials: 20
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 20
          multivariate: true

# ── Phase A + B best params (all fixed) ──────────────────────────────────────
parameters:
  thresholds.signal_adaptation.atr_period:
    type: fixed
    value: 14
  thresholds.entry_conf_overall:
    type: fixed
    value: 0.25
  thresholds.min_edge:
    type: fixed
    value: 0.01
  thresholds.regime_proba.balanced:
    type: fixed
    value: 0.36
  thresholds.regime_proba.bull:
    type: fixed
    value: 0.5
  thresholds.regime_proba.bear:
    type: fixed
    value: 0.5
  thresholds.regime_proba.ranging:
    type: fixed
    value: 0.5
  thresholds.signal_adaptation.zones.low.entry_conf_overall:
    type: fixed
    value: 0.16
  thresholds.signal_adaptation.zones.low.regime_proba:
    type: fixed
    value: 0.33
  thresholds.signal_adaptation.zones.mid.entry_conf_overall:
    type: fixed
    value: 0.4
  thresholds.signal_adaptation.zones.mid.regime_proba:
    type: fixed
    value: 0.51
  thresholds.signal_adaptation.zones.high.entry_conf_overall:
    type: fixed
    value: 0.32
  thresholds.signal_adaptation.zones.high.regime_proba:
    type: fixed
    value: 0.57
  gates.hysteresis_steps:
    type: fixed
    value: 3
  gates.cooldown_bars:
    type: fixed
    value: 2
  exit.exit_conf_threshold:
    type: fixed
    value: 0.42
  exit.max_hold_bars:
    type: fixed
    value: 8
  exit.trailing_stop_pct:
    type: fixed
    value: 0.022
  htf_exit_config.partial_1_pct:
    type: fixed
    value: 0.5
  htf_exit_config.partial_2_pct:
    type: fixed
    value: 0.45
  htf_exit_config.fib_threshold_atr:
    type: fixed
    value: 0.9
  htf_exit_config.trail_atr_multiplier:
    type: fixed
    value: 2.5
  multi_timeframe.ltf_override_threshold:
    type: fixed
    value: 0.4
  multi_timeframe.regime_intelligence.enabled:
    type: fixed
    value: true
  multi_timeframe.regime_intelligence.version:
    type: fixed
    value: "v2"
  multi_timeframe.regime_intelligence.authority_mode:
    type: fixed
    value: "regime_module"
  multi_timeframe.regime_intelligence.clarity_score.enabled:
    type: fixed
    value: true
  multi_timeframe.regime_intelligence.clarity_score.weights.confidence:
    type: fixed
    value: 0.2
  multi_timeframe.regime_intelligence.clarity_score.weights.edge:
    type: fixed
    value: 0.4
  multi_timeframe.regime_intelligence.clarity_score.weights.ev:
    type: fixed
    value: 0.3
  multi_timeframe.regime_intelligence.clarity_score.weights.regime_alignment:
    type: fixed
    value: 0.1
  multi_timeframe.regime_intelligence.size_multiplier.min:
    type: fixed
    value: 0.3
  multi_timeframe.regime_intelligence.size_multiplier.max:
    type: fixed
    value: 1.0
  risk.htf_regime_size_multipliers.bear:
    type: fixed
    value: 0.6
  risk.volatility_sizing.high_vol_multiplier:
    type: fixed
    value: 0.8
  htf_fib.entry.tolerance_atr:
    type: fixed
    value: 4.0
  htf_fib.entry.long_max_level:
    type: fixed
    value: 0.236
  htf_fib.entry.short_min_level:
    type: fixed
    value: 0.35
  ltf_fib.entry.tolerance_atr:
    type: fixed
    value: 1.5
  ltf_fib.entry.long_max_level:
    type: fixed
    value: 0.146
  ltf_fib.entry.short_min_level:
    type: fixed
    value: 0.236

  # ── Phase D tunable: risk_state ───────────────────────────────────────────────
  multi_timeframe.regime_intelligence.risk_state.enabled:
    type: fixed
    value: true

  multi_timeframe.regime_intelligence.risk_state.drawdown_guard.soft_threshold:
    type: float
    low: 0.02
    high: 0.06
    step: 0.01

  multi_timeframe.regime_intelligence.risk_state.drawdown_guard.hard_threshold:
    type: float
    low: 0.04
    high: 0.12
    step: 0.02

  multi_timeframe.regime_intelligence.risk_state.drawdown_guard.soft_mult:
    type: float
    low: 0.50
    high: 0.90
    step: 0.10

  multi_timeframe.regime_intelligence.risk_state.drawdown_guard.hard_mult:
    type: float
    low: 0.20
    high: 0.60
    step: 0.10

  multi_timeframe.regime_intelligence.risk_state.transition_guard.enabled:
    type: fixed
    value: true

  multi_timeframe.regime_intelligence.risk_state.transition_guard.guard_bars:
    type: int
    low: 2
    high: 8
    step: 1

  multi_timeframe.regime_intelligence.risk_state.transition_guard.mult:
    type: float
    low: 0.40
    high: 0.80
    step: 0.10
