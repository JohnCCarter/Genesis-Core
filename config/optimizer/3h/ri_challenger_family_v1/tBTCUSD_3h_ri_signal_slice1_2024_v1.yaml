  thresholds.min_edge:
    type: fixed
    value: 0.01
  thresholds.regime_proba.bull:
    type: fixed
    value: 0.5
  thresholds.regime_proba.bear:
    type: fixed
    value: 0.5
  thresholds.regime_proba.ranging:
    type: fixed
    value: 0.5
  thresholds.signal_adaptation.atr_period:
    type: fixed
    value: 14
  multi_timeframe.regime_intelligence.enabled:
    type: fixed
    value: true
  multi_timeframe.regime_intelligence.version:
    type: fixed
    value: "v2"
  multi_timeframe.regime_intelligence.authority_mode:
    type: fixed
    value: "regime_module"
  multi_timeframe.regime_intelligence.clarity_score.enabled:
    type: fixed
    value: false
  multi_timeframe.regime_intelligence.risk_state.enabled:
