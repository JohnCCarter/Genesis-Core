# Status: proposed manual draft for the research-evidence lane only.
# Non-authoritative. Not consumed by runtime, dispatch, validation, promotion,
# or shared-truth workflows.
schema_version: year_worker_output_contract.canonical_draft.v1
draft_status: proposed_non_authoritative
manual_proposal: true
runtime_authority: none
dispatch_authority: none
promotion_authority: none
purpose: >-
  Proposed reusable manual form for the exact output a year-worker returns after a
  bounded execution or fail-closed stop. This draft is docs-only,
  non-authoritative, and does not itself assign larger meaning, cross-year truth,
  or runtime action.
required_fields:
  - name: status
    type: enum
    description: Worker outcome for the bounded year slice.
  - name: year
    type: integer
    description: Year targeted by the worker.
  - name: symbol
    type: string
    description: Symbol pinned for the worker.
  - name: timeframe
    type: string
    description: Timeframe pinned for the worker.
  - name: slice_id
    type: string
    description: Stable identity of the worker slice.
  - name: base_sha
    type: string
    description: Repo state confirmed by the worker.
  - name: manifest_hashes
    type: object
    description: Hashes for the envelope and manifests that governed the run.
  - name: artifacts_produced
    type: array
    description: Declared artifacts actually produced or explicitly missing.
  - name: observed
    type: array
    description: Directly supported facts from declared artifacts only.
  - name: inferred
    type: array
    description: Fail-closed reporting only; never a substitute for missing evidence.
  - name: unverified
    type: array
    description: Open uncertainty or unchecked hypotheses.
  - name: limitations
    type: array
    description: Explicit limits of the worker result.
  - name: missing_dependencies
    type: array
    description: Required dependencies that remained missing or unverifiable.
  - name: what_this_year_does_not_prove
    type: array
    description: Explicit non-claims about the year result.
  - name: recommended_integration_class
    type: enum
    description: Worker recommendation only; final classification belongs to integration plane.
  - name: scope_adherence_report
    type: object
    description: Whether the worker stayed inside its declared scope and allowed inputs.
optional_fields:
  - name: dispatch_id
    type: string
    description: Dispatch identity when available.
  - name: artifact_namespace
    type: string
    description: Namespace root owned by the worker.
  - name: runtime_window_confirmed
    type: object
    description: Confirmed year window and execution locks.
  - name: provenance
    type: object
    description: Additional provenance fields such as branch, worker class, and envelope ref.
  - name: contradictions_found
    type: array
    description: Internal contradictions observed within the bounded slice only.
  - name: assumptions_rejected
    type: array
    description: Assumptions the worker explicitly rejected during the slice.
allowed_enum_values:
  draft_status:
    - proposed_non_authoritative
  status:
    - pass
    - null
    - blocked
    - fail_closed
  recommended_integration_class:
    - ignore
    - park
    - blocked
    - rerun_required
    - deep_dive_required
    - integrate_candidate
  artifact_status:
    - produced
    - declared_but_missing
    - referenced_only
    - capture_required
  scope_adherence_verdict:
    - in_scope
    - potential_drift
    - violated
inference_policy:
  rules:
    - inferred is fail-closed reporting only.
    - inferred must never backfill a missing required input, missing provenance, or cross-year claim.
    - For a clean admissible pass case, inferred should normally be empty or minimal.
    - observed must cite declared and produced artifacts only.
    - unverified may record open questions, but not hidden rescue assumptions.
authority_policy:
  rules:
    - A worker output may recommend an integration class but may not assign final classification.
    - A worker output may not make global, cross-year, readiness, or promotion claims.
    - If larger interpretation is needed, it belongs in integration plane, not in the worker output.
manifest_hash_policy:
  required_hashes:
    - envelope_hash
    - dependency_manifest_hash
    - repo_snapshot_manifest_hash
    - runtime_execution_manifest_hash
    - generated_overlay_hash
  rules:
    - Missing required manifest hashes block honest intake.
    - Hashes must correspond to the exact artifacts referenced by the worker.
example_blocked_output:
  status: blocked
  year: 2024
  symbol: tBTCUSD
  timeframe: 3h
  slice_id: year_worker_ri_policy_router_2024_tbtcusd_3h
  base_sha: <PINNED_BASE_SHA>
  manifest_hashes:
    envelope_hash: <ENVELOPE_HASH>
    dependency_manifest_hash: <DEPENDENCY_MANIFEST_HASH>
    repo_snapshot_manifest_hash: <REPO_SNAPSHOT_MANIFEST_HASH>
    runtime_execution_manifest_hash: <RUNTIME_EXECUTION_MANIFEST_HASH>
    generated_overlay_hash: null
  artifacts_produced:
    - role: validation_report
      path: results/workforce/year_workers/<run_id>/validation_report.json
      status: produced
    - role: worker_output_contract
      path: results/workforce/year_workers/<run_id>/worker_output_contract.yaml
      status: produced
  observed:
    - generated_overlay_ref was absent at startup preflight
    - execution did not begin because a required manifest artifact was missing
  inferred: []
  unverified:
    - whether a future materialized overlay would preserve merged effective config parity
  limitations:
    - runtime command was not executed
    - no year-level economic claim can be made from this blocked result
  missing_dependencies:
    - generated_overlay_ref
  what_this_year_does_not_prove:
    - that 2024 is favorable or unfavorable
    - that dispatch would succeed once retried without rebuilding the missing artifact set
  recommended_integration_class: blocked
  scope_adherence_report:
    verdict: in_scope
    forbidden_paths_touched: []
    undeclared_inputs_detected: false
    notes:
      - worker stopped before runtime execution because preflight failed
what_this_manifest_does_not_prove:
  - That inferred claims may be used to rescue missing evidence.
  - That a worker recommendation is the same thing as an integration-plane verdict.
  - That pass status authorizes cross-year truth by itself.
