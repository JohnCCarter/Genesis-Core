comparison_classification_vocabulary:
  structurally_consistent: compared_ref_shapes_align_without_acceptance_truth_or_correctness_inference
  partially_consistent: some_compared_ref_shapes_align_while_other_relations_remain_missing_or_mismatched
  unresolved: evidence_is_insufficient_to_close_the_comparison
  intentionally_blocked: policy_forbids_closure_or_upgrade_in_this_slice
  forbidden_to_infer: truth_correctness_economic_runtime_and_dispatch_inference_are_prohibited
  discrepancy_detected: compared_refs_or_claim_states_do_not_align
  reconciliation_denied: integration_plane_may_not_close_the_gap_in_this_slice
  review_required: manual_review_is_mandatory_before_any_later_layer_can_say_more
comparison_cases:
  - comparison_case: aligned_expected_and_reported_ref_shape_with_unresolved_receipt
    comparison_classification: structurally_consistent
    inference_guard: forbidden_to_infer
    review_disposition: unresolved
  - comparison_case: declared_role_has_partial_alignment_but_registry_ref_is_misaligned
    comparison_classification: partially_consistent
    inference_guard: forbidden_to_infer
    review_disposition: review_required
  - comparison_case: expected_role_missing_from_reported_refs
    comparison_classification: discrepancy_detected
    inference_guard: forbidden_to_infer
    review_disposition: review_required
receipt_claim_mismatch_behavior: discrepancy_detected_then_review_required
registry_ref_mismatch_behavior: discrepancy_detected_then_reconciliation_denied
