# Status: proposed manual draft for the research-evidence lane only.
# Non-authoritative. Not consumed by runtime, dispatch, validation,
# promotion, storage, or shared-truth workflows.
schema_version: artifact_registry_index_model_draft.v1
draft_status: proposed_non_authoritative
manual_proposal: true
runtime_authority: none
dispatch_authority: none
promotion_authority: none
backend_decision: none
implementation_state: not_implemented
skill_usage: no_suitable_repository_skill_identified_for_docs_only_research_evidence_slice
purpose: >-
  Proposed reusable manual form for recording expected artifact declarations and
  reported receipt claims for a year-worker slice. This draft is docs-only,
  non-authoritative, and bookkeeping-oriented only. It does not implement a
  registry, does not select persistence, and does not imply integration
  acceptance or semantic meaning.
required_fields:
  - name: registry_entry_id_pattern
    type: string_pattern
    description: Pattern for one registry bookkeeping entry.
  - name: receipt_id_pattern
    type: string_pattern
    description: Pattern for the future receipt identifier.
  - name: artifact_id_pattern
    type: string_pattern
    description: Pattern for the future artifact identifier.
  - name: artifact_namespace_pattern
    type: string_pattern
    description: Pattern for the future artifact namespace.
  - name: producer_refs
    type: object
    description: Documentary refs describing claim origin only.
  - name: lineage_refs
    type: object
    description: Documentary refs back to governing queue, envelope, dependency, preflight, dispatch, output, and intake surfaces.
  - name: expected_artifacts
    type: array
    description: Artifact roles declared as expected for the bounded slice.
  - name: reported_receipt_claims
    type: array
    description: Receipt claims reported for bookkeeping only; not acceptance.
  - name: registry_entry_state
    type: enum
    description: Current bookkeeping state of the registry entry.
  - name: content_hash_policy
    type: object
    description: Hash format and placeholder rules, not a concrete digest.
  - name: intake_validation_state
    type: enum
    description: Integration intake review status for the registry entry.
  - name: denial_reason
    type: enum
    description: Explicit reason the entry remains blocked or rejected.
optional_fields:
  - name: notes
    type: array
    description: Human-readable cautions about denied or blocked states.
  - name: duplicate_group_key_pattern
    type: string_pattern
    description: Pattern for grouping potentially duplicate artifact claims.
  - name: staleness_basis
    type: object
    description: Fields compared to decide whether a claim is stale.
allowed_enum_values:
  draft_status:
    - proposed_non_authoritative
  registry_entry_state:
    - format_only
    - not_evaluated
    - receipt_claim_recorded
    - blocked_missing_artifact
    - blocked_hash_mismatch
    - blocked_incomplete_receipt
    - blocked_lineage_mismatch
    - rejected_undeclared_artifact
    - rejected_duplicate_artifact
    - rejected_stale_artifact
    - rejected_forbidden_producer
    - rejected_artifact_claim
  intake_validation_state:
    - not_evaluated
    - blocked
    - fail_closed
  receipt_claim_state:
    - not_reported
    - format_only
    - reported_unverified
    - rejected
  artifact_expectation_state:
    - declared_expected
    - optional_declared
    - not_declared
  content_hash_state:
    - policy_only
    - not_reported
    - reported_unverified
    - mismatch_detected
    - forbidden_placeholder_upgrade
  denial_reason:
    - none
    - no_artifact_claim_reported
    - incomplete_receipt_shape
    - hash_mismatch_detected
    - undeclared_artifact_claimed
    - duplicate_artifact_claimed
    - stale_artifact_claimed
    - forbidden_producer_detected
    - lineage_mismatch_detected
    - intake_validation_blocked
registry_invariants:
  rules:
    - Receipt presence is evidentiary only and does not imply truth.
    - Registry presence is bookkeeping only and does not imply integration acceptance.
    - Artifact existence does not imply economic validity.
    - Only integration plane may classify meaning.
    - Registry bookkeeping may not backfill missing lineage, missing provenance, or missing hash evidence.
expected_vs_reported_policy:
  rules:
    - Expected artifacts come from declared slice context such as dispatch package and worker output contract.
    - Reported receipt claims are bookkeeping inputs only until integration reviews them.
    - An expected artifact may remain missing without any reported receipt claim.
    - A reported claim for an undeclared artifact must be rejected and remain non-authoritative.
missing_artifact_policy:
  rules:
    - Missing expected artifact forces blocked_missing_artifact or equivalent denied state.
    - Missing expected artifact may not be repaired by inference from registry presence.
rejected_artifact_policy:
  rules:
    - A rejected artifact claim stays explicit and must not be silently dropped.
    - Rejection does not assign larger meaning; it only preserves fail-closed bookkeeping.
duplicate_artifact_policy:
  rules:
    - Conflicting claims for the same artifact_id_pattern or duplicate_group_key_pattern fail closed.
    - Duplicate claims require manual integration review.
stale_artifact_policy:
  rules:
    - A claim is stale when its lineage context no longer matches the active dispatch or governing base_sha context.
    - Stale claims may not be upgraded through registry presence alone.
hash_mismatch_policy:
  rules:
    - Hash mismatch blocks honest intake.
    - Concrete digest text is optional to later implementation, but mismatch semantics must remain explicit.
    - Placeholder tokens may never be treated as a valid digest.
undeclared_artifact_policy:
  rules:
    - Claims for undeclared artifacts must be rejected.
    - Registry bookkeeping may record the rejection, but not accept the artifact.
forbidden_fields:
  - storage_backend
  - uri
  - bucket
  - object_key
  - download_url
  - upload_url
  - runner
  - exit_code
  - execution_region
  - container_image
example_blocked_registry_index:
  registry_entry_id_pattern: registry::<slice_id>::<artifact_role>::<entry_slot>
  receipt_id_pattern: receipt::<slice_id>::<artifact_role>::<producer_slot>::<sequence_slot>
  artifact_id_pattern: artifact::<slice_id>::<artifact_role>::<namespace_slot>
  artifact_namespace_pattern: namespace::<slice_id>::<artifact_family>::<generation_slot>
  producer_refs:
    declared_by_output_contract_ref: docs/contracts/workforce/year_worker_dry_run_output_contract_2026-05-07.yaml
    received_by_integration_intake_ref: docs/contracts/workforce/year_worker_dry_run_integration_intake_2026-05-07.yaml
  lineage_refs:
    queue_item_ref: docs/contracts/workforce/year_worker_dry_run_queue_item_2026-05-07.yaml
    envelope_ref: docs/contracts/workforce/year_worker_dry_run_envelope_2026-05-07.yaml
    dependency_manifest_ref: docs/contracts/workforce/year_worker_dry_run_dependency_manifest_2026-05-07.yaml
    runtime_preflight_ref: docs/contracts/workforce/year_worker_runtime_preflight_admissibility_specimen_2026-05-07.yaml
    dispatch_package_ref: docs/contracts/workforce/year_worker_dispatch_package_manifest_specimen_2026-05-07.yaml
    output_contract_ref: docs/contracts/workforce/year_worker_dry_run_output_contract_2026-05-07.yaml
    integration_intake_ref: docs/contracts/workforce/year_worker_dry_run_integration_intake_2026-05-07.yaml
  expected_artifacts:
    - artifact_role: worker_output_contract
      expectation_state: declared_expected
  reported_receipt_claims: []
  registry_entry_state: blocked_missing_artifact
  intake_validation_state: not_evaluated
  denial_reason: no_artifact_claim_reported
  content_hash_policy:
    algorithm: sha256
    content_hash_format: sha256:<64-lowercase-hex>
    content_hash_state: policy_only
    placeholder_rule: never_fabricate_digest_text
what_this_manifest_does_not_prove:
  - That a registry implementation exists.
  - That receipt bookkeeping implies integration acceptance.
  - That artifact existence implies economic validity.
  - That any registry entry may classify meaning outside integration plane.
