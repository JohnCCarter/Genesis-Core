description: "Regime Intelligence first SIGNAL slice: bounded 27-combination research grid over zone entry thresholds on 2023-12-21..2024-06-30, validate 2024-07-01..2024-12-31 (3h)"
strategy_family: ri
#
# Purpose:
# - open the first admissible SIGNAL-only research slice after the exit/override plateau closeout
# - preserve the slice10 research backdrop and vary only already implemented zone entry thresholds
# - enumerate the exact 27 permitted SIGNAL combinations under run_intent=research_slice
#
# Donor surface carried into this slice:
# - donor YAML: config/optimizer/3h/ri_challenger_family_v1/tBTCUSD_3h_ri_challenger_family_slice10_2024_v1.yaml
# - fixed from donor: RI-family identity, windows, atr_period, zone regime_proba values, entry/gating backbone,
#   exit cadence, fib surface, risk-state guards, regime-aware sizing, and promotion disabled
# - reopened exactly as authorized: thresholds.signal_adaptation.zones.{low,mid,high}.entry_conf_overall
#
# Governance note:
# - this YAML is a research-only config artifact
# - strategy: grid is used intentionally to exhaustively enumerate the exact 27 allowed combinations
# - this YAML does not open comparison, readiness, promotion, runtime/default/champion change, or family-rule reinterpretation

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2023-12-21_2024-06-30_v1
  warmup_bars: 120
  runs:
    strategy: grid
    score_version: "v2"
    run_intent: research_slice

    use_sample_range: true
    sample_start: "2023-12-21"
    sample_end: "2024-06-30"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2024-07-01"
      sample_end: "2024-12-31"
      top_n: 5
      constraints:
        include_scoring_failures: false
        min_trades: 20
        min_profit_factor: 1.05
        max_max_dd: 0.35

    resume: false
    max_trials: 27
    max_concurrent: 1

    promotion:
      enabled: false

constraints:
  include_scoring_failures: false
  max_max_dd: 0.60
  min_profit_factor: 0.80

  scoring_thresholds:
    min_trades: 10
    min_profit_factor: 0.0
    max_max_dd: 1.0

