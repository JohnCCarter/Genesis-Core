schema_version: repo_snapshot_manifest.canonical_draft.v1
draft_status: proposed_non_authoritative
manual_proposal: true
runtime_authority: none
dispatch_authority: none
promotion_authority: none
purpose: >-
  Proposed reusable manual form for declaring the repo-tracked, branch-visible
  input subset that a clean cloud clone can satisfy directly. This draft is
  docs-only and does not itself prove dependency closure completeness.
required_fields:
  - name: schema_version
    type: string
    description: Identifies the canonical draft form version.
  - name: draft_status
    type: enum
    description: Must state proposed/non-authoritative status.
  - name: task_id
    type: string
    description: Task identity tied to one concrete closure slice.
  - name: dispatch_id
    type: string
    description: Dispatch instance identity.
  - name: base_branch
    type: string
    description: Branch on which repo visibility is evaluated.
  - name: base_sha
    type: string
    description: Pinned repo startpoint for snapshot calculation.
  - name: tracked_inputs
    type: array
    description: Repo-tracked inputs that are expected to exist in a clean cloud clone.
optional_fields:
  - name: notes
    type: array
    description: Human-readable constraints about snapshot interpretation.
  - name: excluded_from_snapshot
    type: array
    description: Explicitly excluded inputs that are required elsewhere but not satisfied by repo state.
allowed_enum_values:
  draft_status:
    - proposed_non_authoritative
hash_policy:
  algorithm: sha256
  rules:
    - Every tracked input should carry a SHA256.
    - Snapshot membership is invalid if the file is not tracked on the target branch.
cloud_visibility_policy:
  rules:
    - cloud_visible means satisfiable by clean clone of the target branch
    - tracked false implies remote_visible false for repo snapshot purposes
    - local-only files must never appear in tracked_inputs
missing_dependency_behavior:
  rules:
    - Missing required non-tracked files belong in excluded_from_snapshot or missing dependency report, never in tracked_inputs.
    - Repo snapshot completeness does not override missing artifact blockers elsewhere in the closure.
fail_closed_conditions:
  - any tracked_input hash cannot be pinned
  - a local-only or non-tracked file appears as snapshot-satisfied
  - base_sha or base_branch for the snapshot cannot be confirmed
example_agent_a_2023_06:
  task_id: workforce_v1_agent_a_2023_06_dependency_closure
  dispatch_id: workforce_v1_agent_a_2023_06_dependency_closure_2026-05-07
  base_branch: feature/next-slice-2026-05-06
  base_sha: cf852ad8a559dfd8313405c3c30806fd3ff00e08 # pragma: allowlist secret
  tracked_inputs:
    - path: docs/decisions/governance/workforce/workforce_v1_wave1_cloud_batch_dispatch_2026-05-07.md
      role: batch_dispatch_brief
      sha256: 608a7226cbdb172b1668fa24f671be6396f9d5b0db57eadad4049eb67c670cf9 # pragma: allowlist secret
    - path: docs/decisions/governance/workforce/workforce_v1_wave1_agent_a_d1_2023_06_cloud_dispatch_2026-05-07.md
      role: worker_dispatch_brief
      sha256: 34d70e8deda007d14f3fc63115c4b4899db0998902f7e3f50a1bcd87cf06f8e5 # pragma: allowlist secret
    - path: results/evaluation/ri_policy_router_insufficient_evidence_d1_context_clean_selectivity_falsifier_2026-05-05.json
      role: tracked_machine_readable_artifact
      sha256: 194e4e6f188999277ecefa6ad72c399f30a1bfbec219cc072fdfea7aa2d9be04 # pragma: allowlist secret
  excluded_from_snapshot:
    - path: results/backtests/ri_policy_router_enabled_vs_absent_all_years_20260428_curated_only/2023_enabled_vs_absent_action_diffs.json
      reason: tracked false and therefore not cloud-visible in repo snapshot
what_this_manifest_does_not_prove:
  - That non-repo dependencies are satisfied.
  - That dispatch_allowed should become true.
  - That local existence of excluded files is operationally valid for cloud.
