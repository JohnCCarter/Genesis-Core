schema_version: worker_runtime_execution_manifest.canonical_draft.v1
draft_status: proposed_non_authoritative
manual_proposal: true
runtime_authority: none
dispatch_authority: none
promotion_authority: none
purpose: >-
  Proposed reusable manual form for compiling one year-worker runtime execution plan
  from a pinned baseline config ref, a deterministic generated overlay carrier, declared
  runtime inputs, and fail-closed clean-clone admission rules. This draft is docs-only,
  non-authoritative, and does not itself enable dispatch or runtime execution.
required_fields:
  - name: schema_version
    type: string
    description: Identifies the draft form version.
  - name: draft_status
    type: enum
    description: Must explicitly mark the form as proposed and non-authoritative.
  - name: task_id
    type: string
    description: Stable task identity for the year-worker slice.
  - name: dispatch_id
    type: string
    description: Dispatch instance identity for the concrete year-worker plan.
  - name: worker_class
    type: enum
    description: Worker capability class for the slice.
  - name: lane
    type: enum
    description: Cheapest admissible lane for the slice.
  - name: resolved_mode
    type: enum
    description: Pre-resolved governance mode supplied by control plane.
  - name: base_branch
    type: string
    description: Branch used for the dispatch wave.
  - name: base_sha
    type: string
    description: Pinned repo startpoint used for the runtime plan.
  - name: baseline_config_ref
    type: object
    description: Authoritative config source used as immutable baseline.
  - name: generated_overlay
    type: object
    description: Deterministic carrier derived from the baseline under a declared overlay policy.
  - name: runtime_window
    type: object
    description: Locked execution window and run parameters for one year-worker.
  - name: execution_mode_lock
    type: object
    description: Locked mode/env settings required for comparable backtest execution.
  - name: runtime_inputs
    type: object
    description: Explicit runtime entrypoint, data/config/env inputs, and closure dependency refs.
  - name: command_template
    type: object
    description: Structured command template for rendering a clean-clone run command.
  - name: expected_artifacts
    type: object
    description: Artifact namespace contract and explicit output surfaces.
  - name: validation_contract
    type: object
    description: Preflight and post-run checks required before integration review.
  - name: merged_config_provenance
    type: object
    description: Requirements for validating effective config identity and provenance fields.
  - name: drift_detection_policy
    type: object
    description: Rules for distinguishing allowed year variance from forbidden config drift.
  - name: dispatch_allowed
    type: boolean
    description: Dispatch admission result after runtime-plan and dependency-closure review.
  - name: dispatch_block_reason
    type: enum
    description: Explicit block reason when dispatch_allowed is false.
optional_fields:
  - name: notes
    type: array
    description: Human-readable caveats about proposal/manual status.
  - name: question_fingerprint
    type: string
    description: Stable identity for the execution question when available.
  - name: source_dispatch
    type: object
    description: Optional pointers back to the source workforce dispatch brief(s).
  - name: dependency_closure_ref
    type: string_or_null
    description: Reference to the closure manifest/audit that must pass before dispatch.
  - name: what_this_manifest_does_not_prove
    type: array
    description: Known gaps and explicit non-claims.
allowed_enum_values:
  draft_status:
    - proposed_non_authoritative
  worker_class:
    - inventory
    - deep-dive
    - integration
    - runtime/strict
  lane:
    - concept
    - research-evidence
    - runtime-integration
  resolved_mode:
    - RESEARCH
    - STRICT
    - SANDBOX
  baseline_config_kind:
    - champion_merged_config
    - runtime_seed
    - reviewed_runtime_payload
  overlay_policy_profile:
    - year_window_locked_v1
  overlay_generation_mode:
    - complete_merged_config_carrier
    - reviewed_runtime_merge
  overlay_materialization_status:
    - not_materialized
    - materialized_but_unverified
    - materialized_and_hash_pinned
  execution_mode_profile:
    - canonical_backtest_1_1
    - explicit_debug_noncanonical
  dependency_closure_status:
    - not_evaluated
    - blocked
    - fail_closed
    - closure_complete_pending_separate_dispatch_governance
  dispatch_block_reason:
    - dependency_closure_not_evaluated
    - generated_overlay_not_materialized
    - merged_config_hash_not_verified
    - undeclared_local_state_required
    - required_input_not_cloud_visible
    - runtime_contract_incomplete
    - tuning_attempt_detected
allowed_overlay_keys_policy_profiles:
  year_window_locked_v1:
    top_level_overlay_keys_allowed:
      - merged_config
      - runtime_version
      - baseline_config_ref
      - overlay_profile
      - generation_meta
    cfg_keys_allowed: []
    rules:
      - start/end/warmup/data_source_policy/seed are runtime-manifest locks, not config overlay keys.
      - A non-empty cfg delta under this profile is treated as tuning and must fail closed.
      - The generated overlay may carry a complete merged_config copy, but it may not rewrite config truth files.
forbidden_config_keys_policy_profiles:
  year_window_locked_v1:
    forbidden_key_families:
      - thresholds/**
      - gates/**
      - risk/**
      - exit/**
      - multi_timeframe/**
      - htf_exit_config/**
      - htf_fib/**
      - ltf_fib/**
      - ev/**
      - features/**
      - intelligence/**
    rules:
      - Workers must not tune thresholds, gate values, sizing, exits, or regime logic across years.
      - Workers must not mutate champion files, runtime authority files, or shared config truth.
      - Any requested override outside the allowed profile requires a separately governed runtime slice.
runtime_lock_policy:
  required_locked_fields:
    - runtime_window.symbol
    - runtime_window.timeframe
    - runtime_window.start
    - runtime_window.end
    - runtime_window.warmup_bars
    - runtime_window.data_source_policy
    - execution_mode_lock.random_seed
    - execution_mode_lock.fast_window
    - execution_mode_lock.precompute_features
  rules:
    - Year-to-year variance belongs in the runtime window only unless separately governed.
    - Warmup, data source policy, and canonical mode must stay identical across comparable year-workers.
command_template_contract:
  render_style: structured_args_only
  rules:
    - Shell-specific rendering is environment-dependent and must not be the canonical contract surface.
    - The entrypoint path and required args must be pinned before dispatch review.
    - Optional args may be omitted only if the manifest says they are intentionally unused.
  required_env_keys:
    - GENESIS_RANDOM_SEED
    - GENESIS_FAST_WINDOW
    - GENESIS_PRECOMPUTE_FEATURES
    - GENESIS_MODE_EXPLICIT
  required_args:
    - --symbol
    - --timeframe
    - --start
    - --end
    - --warmup
    - --data-source-policy
    - --config-file
  canonical_flags:
    - --fast-window
    - --precompute-features
  optional_args:
    - --decision-rows-out
    - --decision-rows-format
    - --intelligence-shadow-out
    - --compare
    - --no-save
artifact_namespace_contract:
  required_fields:
    - namespace_root
    - explicit_artifacts
    - timestamped_runner_artifacts
    - capture_rule
  rules:
    - Explicit worker outputs should live under a worker/year namespace root.
    - Timestamped runner outputs under results/backtests and results/trades remain admissible only if they can be mapped back to the manifest without ambiguity.
    - If actual output filenames cannot be bijectively attributed to the manifest run, the slice must fail closed.
merged_config_provenance_policy:
  required_result_fields:
    - config_provenance
    - merged_config
    - runtime_version
    - runtime_version_current
  rules:
    - baseline_config_ref sha256 must be pinned before dispatch review.
    - generated_overlay sha256 must be pinned once the carrier is materialized.
    - merged_config_hash must only be recorded after an explicit deterministic serialization method is bound.
    - Until that serialization method is bound, the manifest must treat merged_config_hash validation as blocked or not yet evaluated.
drift_detection_policy_contract:
  required_comparison_tuple:
    - baseline_config_ref.sha256
    - generated_overlay.overlay_policy_profile
    - generated_overlay.overlay_generation_mode
    - execution_mode_lock.profile
    - execution_mode_lock.random_seed
    - runtime_window.data_source_policy
    - runtime_window.warmup_bars
    - runtime_inputs.entrypoint_ref.sha256
  allowed_year_variance:
    - runtime_window.start
    - runtime_window.end
    - subject.year
    - dispatch_id
    - expected_artifacts.namespace_root
  fail_closed_triggers:
    - baseline config hash differs across supposedly comparable year-workers
    - generated overlay carries a non-empty cfg delta under year_window_locked_v1
    - execution mode lock differs across compared year-workers
    - runner entrypoint hash differs without explicit review
clean_clone_admission_policy:
  rules:
    - All runtime inputs must be declared and satisfiable in a clean clone or explicit bundle.
    - Undeclared local files, shell state, or operator notes are inadmissible.
    - Dependency closure must be reviewed before dispatch_allowed can become true.
  fail_closed_conditions:
    - required input is not repo-visible or explicitly bundled
    - generated overlay is not materialized and hash-pinned
    - dependency closure is not evaluated or returns blocked/fail_closed
    - merged_config provenance cannot be reconciled with the declared baseline and overlay model
example_year_worker_shape:
  baseline_config_ref:
    kind: champion_merged_config
    selector: merged_config
  generated_overlay:
    overlay_policy_profile: year_window_locked_v1
    overlay_generation_mode: complete_merged_config_carrier
    materialization_status: not_materialized
  runtime_window:
    symbol: tBTCUSD
    timeframe: 3h
    start: 2024-01-02
    end: 2024-12-31
    warmup_bars: 120
    data_source_policy: frozen_first
  execution_mode_lock:
    profile: canonical_backtest_1_1
    random_seed: 42
    fast_window: true
    precompute_features: true
  dispatch_allowed: false
  dispatch_block_reason: dependency_closure_not_evaluated
what_this_manifest_does_not_prove:
  - That automation or runtime enforcement already exists for this manifest.
  - That year-worker dispatch is admissible on the current repo state.
  - That merged_config hashing is fully bound by a current canonical serialization rule.
  - That timestamped runner outputs can already be captured without an explicit mapping step.
