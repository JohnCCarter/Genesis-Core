description: "Regime Intelligence slice 1: train on 2023-12-21..2024-06-30, rank on 2024-07-01..2024-12-31 (3h)"
strategy_family: ri
#
# Purpose:
# - create the first narrow RI Optuna campaign for tBTCUSD 3h
# - test authority_mode as the primary driver
# - keep clarity excluded in slice 1
# - keep risk_state enabled and tunable around the best observed ablation neighborhood
# - defer blind 2025 fixed-candidate evaluation until after a winner is frozen

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2023-12-21_2024-06-30_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2023-12-21"
    sample_end: "2024-06-30"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2024-07-01"
      sample_end: "2024-12-31"
      top_n: 5
      constraints:
        include_scoring_failures: false
        min_trades: 20
        min_profit_factor: 1.05
        max_max_dd: 0.35

    resume: false
    max_trials: 60
    max_concurrent: 1

    promotion:
      enabled: false

    optuna:
      study_name: "ri_train_validate_slice1_3h_2023H1_2024H1"
      storage: "sqlite:///results/hparam_search/storage/ri_train_validate_slice1_3h_2023H1_2024H1.db"
      n_jobs: 1
      timeout_seconds: 7200

      bootstrap_random_trials: 16
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 16
          n_ei_candidates: 64
          multivariate: true
          group: true
          constant_liar: true
          seed: 42

constraints:
  include_scoring_failures: false
  max_max_dd: 0.60
  min_profit_factor: 0.80

  scoring_thresholds:
    min_trades: 10
    min_profit_factor: 0.0
    max_max_dd: 1.0

