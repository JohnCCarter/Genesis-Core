      - any phase claims produced artifacts
      - any phase implies replay correctness
    forbidden_to_infer:
      - preflight completeness allows execution
  - phase_id: H
    phase_name: blocked_preflight_completion
    classification: intentionally_blocked
    terminal: true
    required_evidence:
      - terminal state is named blocked_preflight_complete
      - no outgoing operational edge exists
    blocked_if:
