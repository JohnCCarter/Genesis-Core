description: "Regime Intelligence challenger family slice 2: narrow search around validated RI family on 2023-12-21..2024-06-30, rank on 2024-07-01..2024-12-31 (3h)"
#
# Purpose:
# - continue the RI challenger-family search after slice 1
# - preserve the validated RI family identity (regime_module, v2, clarity off)
# - keep incumbent champion as the external control baseline
# - refine only inside the validated RI family instead of reopening topology search

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2023-12-21_2024-06-30_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2023-12-21"
    sample_end: "2024-06-30"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2024-07-01"
      sample_end: "2024-12-31"
      top_n: 5
      constraints:
        include_scoring_failures: false
        min_trades: 20
        min_profit_factor: 1.05
        max_max_dd: 0.35

    resume: false
    max_trials: 48
    max_concurrent: 1

    promotion:
      enabled: false

    optuna:
      study_name: "ri_challenger_family_slice2_3h_2024_v1"
      storage: "sqlite:///results/hparam_search/storage/ri_challenger_family_slice2_3h_2024_v1.db"
      n_jobs: 1
      timeout_seconds: 5400

      bootstrap_random_trials: 12
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 12
          n_ei_candidates: 64
          multivariate: true
          group: true
          constant_liar: true
          seed: 42

constraints:
  include_scoring_failures: false
  max_max_dd: 0.60
  min_profit_factor: 0.80

  scoring_thresholds:
    min_trades: 10
    min_profit_factor: 0.0
    max_max_dd: 1.0

