name: Copilot Setup Steps

# Preparatory only on this branch: Copilot cloud agent will not consume this
# setup workflow until the file exists on the repository default branch.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job name must remain exactly `copilot-setup-steps` for Copilot to use it.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          python -m pip install ".[dev,ml]" || (
            echo "[copilot-setup] pip install failed; purging pip cache and retrying once..." &&
            python -m pip cache purge &&
            python -m pip install ".[dev,ml]"
          )

      - name: Prime pre-commit hooks
        run: pre-commit install-hooks
