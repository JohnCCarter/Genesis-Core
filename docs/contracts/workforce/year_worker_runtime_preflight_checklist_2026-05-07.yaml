  - phase_id: F
    phase_name: runtime_binding_validation
    classification: unresolved
    required_evidence:
      - baseline config identity is named descriptively
      - runner identity is named descriptively
      - hash-binding gaps are enumerated
      - namespace examples remain descriptive only
    blocked_if:
      - descriptive refs are treated as closed bindings
      - tracked state is treated as cloud support
    forbidden_to_infer:
      - pinned provenance closes binding gaps
      - descriptive runner naming implies cloud runtime support
  - phase_id: G
    phase_name: execution_prohibition_enforcement
    classification: intentionally_blocked
    required_evidence:
      - operational authority remains none
      - no produced artifacts are claimed
      - no runnable string is rendered
    blocked_if:
