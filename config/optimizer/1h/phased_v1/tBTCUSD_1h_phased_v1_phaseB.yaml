description: "Phase B: 1h Regime Intelligence clarity + sizing (canonical from 1h Phase A best)"
strategy_family: legacy
#
# Provenance / intent:
# - additive RESEARCH config only; no effect unless explicitly selected
# - canonical 1h Phase B derived from the full 1h Phase A best trial on 2026-03-16
# - all non-RI baseline parameters below are fixed from the verified 1h Phase A winner
# - purpose: test RI ON vs OFF on 1h using a fair parent baseline instead of seeded values
#
# Phase A best (full run):
# - score: 0.1018975613
# - trades: 331
# - return: -1.33%
# - PF: 1.29
# - DD: 3.06%
# - Sharpe: 0.073
#
# Fixed from 1h Phase A best-trial:
# - thresholds.entry_conf_overall = 0.45
# - thresholds.regime_proba.balanced = 0.75
# - exit.exit_conf_threshold = 0.40
# - exit.max_hold_bars = 25
# - exit.trailing_stop_pct = 0.016
# - multi_timeframe.ltf_override_threshold = 0.55
# - risk.risk_map = [[0.53,0.005],[0.70,0.008],[0.80,0.010],[0.90,0.012]]
# - risk.htf_regime_size_multipliers.bear = 0.60
# - risk.volatility_sizing.high_vol_multiplier = 0.60

meta:
  symbol: tBTCUSD
  timeframe: 1h
  snapshot_id: snap_tBTCUSD_1h_2024-01-01_2024-12-31_v1
  warmup_bars: 50
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2024-01-01"
    sample_end: "2024-12-31"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2025-01-01"
      sample_end: "2025-10-01"
      top_n: 10

      constraints:
        include_scoring_failures: false
        min_trades: 25
        min_profit_factor: 1.05
        max_max_dd: 0.30

    resume: false
    max_trials: 60
    max_concurrent: 1

    promotion:
      enabled: false

    optuna:
      study_name: "phased_v1_phaseB_RI_1h_2024_2025"
      storage: "sqlite:///results/hparam_search/storage/phased_v1_phaseB_1h.db"
      n_jobs: 1
      timeout_seconds: 7200

      bootstrap_random_trials: 12
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 16
          n_ei_candidates: 48
          multivariate: true
          group: true
          constant_liar: true
          seed: 42

parameters:
  thresholds:
    entry_conf_overall:
      type: fixed
      value: 0.45
    min_edge:
      type: fixed
      value: 0.01
    regime_proba:
      balanced:
        type: fixed
        value: 0.75
      bull:
        type: fixed
        value: 0.50
      bear:
        type: fixed
        value: 0.50
      ranging:
        type: fixed
        value: 0.50

  exit:
    exit_conf_threshold:
      type: fixed
      value: 0.40
    max_hold_bars:
      type: fixed
      value: 25
    trailing_stop_pct:
      type: fixed
      value: 0.016

  htf_exit_config:
    partial_1_pct:
      type: fixed
      value: 0.50
    partial_2_pct:
      type: fixed
      value: 0.45
    fib_threshold_atr:
      type: fixed
      value: 0.9
    trail_atr_multiplier:
      type: fixed
      value: 2.5
    enable_partials:
      type: fixed
      value: true
    enable_trailing:
      type: fixed
      value: true

  multi_timeframe:
    ltf_override_threshold:
      type: fixed
      value: 0.55
    regime_intelligence:
      enabled:
        type: fixed
        value: true
      version:
        type: fixed
        value: "v2"
      authority_mode:
        type: fixed
        value: "legacy"
      clarity_score:
        enabled:
          type: fixed
          value: true
        weights:
          confidence:
            type: float
            low: 0.15
            high: 0.45
            step: 0.05
          edge:
            type: float
            low: 0.10
            high: 0.40
            step: 0.05
          ev:
            type: float
            low: 0.10
            high: 0.35
            step: 0.05
          regime_alignment: "__dirichlet_remainder__"
      size_multiplier:
        min:
          type: float
          low: 0.3
          high: 0.6
          step: 0.1
        max:
          type: float
          low: 1.0
          high: 1.5
          step: 0.1

  risk:
    risk_map:
      type: fixed
      value:
        - [0.53, 0.005]
        - [0.70, 0.008]
        - [0.80, 0.010]
        - [0.90, 0.012]
    htf_regime_size_multipliers:
      bear:
        type: float
        low: 0.3
        high: 0.8
        step: 0.1
    volatility_sizing:
      high_vol_multiplier:
        type: fixed
        value: 0.6

  htf_fib:
    entry:
      tolerance_atr:
        type: fixed
        value: 4.0
      long_max_level:
        type: fixed
        value: 0.236
      short_min_level:
        type: fixed
        value: 0.35
  ltf_fib:
    entry:
      tolerance_atr:
        type: fixed
        value: 1.5
      long_max_level:
        type: fixed
        value: 0.146
      short_min_level:
        type: fixed
        value: 0.236
