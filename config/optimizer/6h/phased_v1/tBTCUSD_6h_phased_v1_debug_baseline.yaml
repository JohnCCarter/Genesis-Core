description: "6h debug baseline: exit/risk-focused non-RI investigation"
strategy_family: legacy
#
# Provenance / intent:
# - additive RESEARCH config only; no effect unless explicitly selected
# - debug-oriented 6h baseline intended to investigate the archived hypothesis that 6h is not primarily a threshold problem
# - Regime Intelligence remains disabled; this is still a non-RI baseline slice
# - unlike 6h Phase A, this debug config deliberately narrows threshold behavior and shifts search effort toward exit/risk management
#
# Debug hypothesis under test:
# - 6h model outputs are already high-confidence enough that threshold changes alone do little
# - the deeper problem may instead sit in trade management, holding horizon, or sizing/risk handling
#
# Therefore this config:
# - fixes entry_conf_overall at a high baseline (0.65)
# - fixes regime_proba.balanced at 0.65
# - keeps RI OFF
# - tunes exit + risk + ltf override only

meta:
  symbol: tBTCUSD
  timeframe: 6h
  snapshot_id: snap_tBTCUSD_6h_2024-01-01_2024-12-31_v1
  warmup_bars: 40
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2024-01-01"
    sample_end: "2024-12-31"

    validation:
      enabled: true
      use_sample_range: true
      sample_start: "2025-01-01"
      sample_end: "2025-10-01"
      top_n: 10

      constraints:
        include_scoring_failures: false
        min_trades: 20
        min_profit_factor: 1.00
        max_max_dd: 0.35

    resume: false
    max_trials: 48
    max_concurrent: 1

    promotion:
      enabled: false

    optuna:
      study_name: "phased_v1_debug_baseline_6h_2024_2025"
      storage: "sqlite:///results/hparam_search/storage/phased_v1_debug_baseline_6h.db"
      n_jobs: 1
      timeout_seconds: 5400

      bootstrap_random_trials: 10
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 14
          n_ei_candidates: 48
          multivariate: true
          group: true
          constant_liar: true
          seed: 42

parameters:
  thresholds:
    entry_conf_overall:
      type: fixed
      value: 0.65
    min_edge:
      type: fixed
      value: 0.01
    regime_proba:
      balanced:
        type: fixed
        value: 0.65
      bull:
        type: fixed
        value: 0.50
      bear:
        type: fixed
        value: 0.50
      ranging:
        type: fixed
        value: 0.50

  exit:
    exit_conf_threshold:
      type: float
      low: 0.45
      high: 0.75
      step: 0.05
    max_hold_bars:
      type: int
      low: 6
      high: 24
      step: 2
    trailing_stop_pct:
      type: float
      low: 0.014
      high: 0.045
      step: 0.002

  htf_exit_config:
    partial_1_pct:
      type: grid
      values: [0.30, 0.50, 0.70]
    partial_2_pct:
      type: grid
      values: [0.20, 0.35, 0.45]
    fib_threshold_atr:
      type: float
      low: 0.7
      high: 1.3
      step: 0.1
    trail_atr_multiplier:
      type: float
      low: 1.8
      high: 3.4
      step: 0.2
    enable_partials:
      type: fixed
      value: true
    enable_trailing:
      type: fixed
      value: true

  multi_timeframe:
    ltf_override_threshold:
      type: float
      low: 0.35
      high: 0.60
      step: 0.05
    regime_intelligence:
      enabled:
        type: fixed
        value: false
      version:
        type: fixed
        value: "v2"
      authority_mode:
        type: fixed
        value: "legacy"
      clarity_score:
        enabled:
          type: fixed
          value: false
      size_multiplier:
        min:
          type: fixed
          value: 0.30
        max:
          type: fixed
          value: 1.00

  risk:
    risk_map:
      type: grid
      values:
        - [[0.60, 0.020], [0.70, 0.030], [0.80, 0.040]]
        - [[0.50, 0.015], [0.60, 0.025], [0.70, 0.035]]
        - [[0.40, 0.010], [0.50, 0.020], [0.60, 0.030]]
    htf_regime_size_multipliers:
      bear:
        type: float
        low: 0.20
        high: 0.80
        step: 0.10
    volatility_sizing:
      high_vol_multiplier:
        type: float
        low: 0.5
        high: 0.9
        step: 0.1

  htf_fib:
    entry:
      tolerance_atr:
        type: fixed
        value: 4.0
      long_max_level:
        type: fixed
        value: 0.236
      short_min_level:
        type: fixed
        value: 0.35
  ltf_fib:
    entry:
      tolerance_atr:
        type: fixed
        value: 1.5
      long_max_level:
        type: fixed
        value: 0.146
      short_min_level:
        type: fixed
        value: 0.236
