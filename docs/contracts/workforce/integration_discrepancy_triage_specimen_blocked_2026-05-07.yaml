  discrepancy_triage_does_not_upgrade_to_runtime_correctness: forbidden
  discrepancy_triage_does_not_upgrade_to_dispatch_authorization: forbidden
  review_recommendation_does_not_upgrade_to_promotion: forbidden
  missing_evidence_may_not_be_silently_resolved: forbidden
  cross_year_meaning_may_not_be_assigned_here: forbidden
final_review_state:
  reconciliation_state: blocked
  acceptance_state: not_accepted
