description: "Phase E: OOS validation -- all params fixed from Phase D trial_039"
strategy_family: ri
#
# Phase D best: trial_039, IS score=0.3393, PF=2.10, DD=1.30%, Sharpe=0.256
# OOS period: 2025-01-01 to 2025-12-31
#
# Run: PYTHONIOENCODING=utf-8 TQDM_DISABLE=1 PYTHONPATH="$(pwd)/src" python -m core.optimizer.runner config/optimizer/3h/phased_v3/tBTCUSD_3h_phased_v3_phaseE_oos.yaml

meta:
  symbol: tBTCUSD
  timeframe: 3h
  snapshot_id: snap_tBTCUSD_3h_2024-01-02_2024-12-31_v1
  warmup_bars: 120
  runs:
    strategy: optuna
    score_version: "v2"

    use_sample_range: true
    sample_start: "2025-01-01"
    sample_end: "2025-12-31"

    validation:
      enabled: false

    resume: false
    max_trials: 1
    max_concurrent: 1

    promotion:
      enabled: false

    constraints:
      include_scoring_failures: false
      min_trades: 10
      min_profit_factor: 1.05
      max_max_dd: 0.45

    optuna:
      study_name: "phased_v3_phaseE_OOS_3h_2025"
      storage: "sqlite:///results/hparam_search/storage/phased_v3_phaseE_3h.db"
      n_jobs: 1
      timeout_seconds: 300

      bootstrap_random_trials: 0
      bootstrap_seed: 42

      pruner:
        type: "none"

      sampler:
        type: "tpe"
        kwargs:
          n_startup_trials: 1

